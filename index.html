  <title>Flip 7 - Compteur de points</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111827;
      --card:#1f2937;
      --border:#334155;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#f59e0b;
      --accent-green:#22c55e;
      --danger:#ef4444;
      --neutral:#334155;
      --radius:16px;
      --tap:40px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:linear-gradient(180deg,#07101c 0%, #0f172a 45%, #111827 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    body{overflow-x:hidden; min-height:100dvh}
    .app{
      width:min(1200px,100%);
      margin:0 auto;
      padding:clamp(8px,1.5vw,16px);
      display:flex;
      flex-direction:column;
      gap:clamp(8px,1.2vw,14px);
    }
    .section{
      background:rgba(17,24,39,.95);
      border:1px solid rgba(51,65,85,.9);
      border-radius:var(--radius);
      padding:clamp(10px,1.4vw,16px);
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }
    h1,h2{margin:0 0 10px 0; line-height:1.15}
    h1{font-size:clamp(1.1rem,1rem + 1vw,1.55rem)}
    h2{font-size:clamp(1rem,.95rem + .75vw,1.25rem)}
    .hidden{display:none !important}
    .setup{display:grid; gap:12px}
    .setup-row{display:flex; flex-wrap:wrap; align-items:center; gap:10px}
    label{color:var(--muted); font-weight:600}
    input,select,button{font:inherit}
    .field,.round-input,.setup-row select,.setup-row input{
      min-height:var(--tap);
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--bg);
      color:var(--text);
      padding:10px 12px;
      outline:none;
    }
    .btn{
      min-height:var(--tap);
      border:none;
      border-radius:12px;
      padding:10px 14px;
      color:white;
      font-weight:800;
      cursor:pointer;
      touch-action:manipulation;
    }
    .btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
    .btn-success{background:linear-gradient(135deg,#16a34a,#15803d)}
    .btn-danger{background:linear-gradient(135deg,#b91c1c,#991b1b)}
    .btn-neutral{background:#475569}
    .btn-home{background:linear-gradient(135deg,#78350f,#92400e)}
    .btn-prev-round{background:#475569}
    .player-count-btns{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .player-count-btn{
      width:44px;
      height:44px;
      padding:0;
      background:#334155;
      font-size:1rem;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .player-count-btn.active{
      background:linear-gradient(135deg,#d97706,#b45309);
    }
    .player-name-inputs{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:10px;
    }
    .layout-play{display:grid; gap:12px}
    .winner-panel{
      background:rgba(15,23,42,.72);
      border:1px solid rgba(51,65,85,.95);
      border-radius:var(--radius);
      padding:12px;
    }
    .scores-panel{
      padding:0;
    }
    .topbar{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap}

    .chrono-btn{
      min-width:90px;
      padding:10px 16px;
      border-radius:14px;
      background:rgba(2,6,23,.5);
      border:1px solid rgba(51,65,85,.95);
      color:#e5e7eb;
      font-size:1.05rem;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
      letter-spacing:.03em;
    }
    .chrono-btn.paused{
      color:#facc15;
      border-color:rgba(250,204,21,.4);
    }
    .game-status{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(2,6,23,.35);
      color:#dbe4f0;
      line-height:1.35;
      flex:1;
      min-width:220px;
    }
    .players-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
    }
    .player-card{
      background:rgba(2,6,23,.24);
      border:1px solid rgba(51,65,85,.95);
      border-radius:14px;
      padding:8px 10px;
    }
    .player-name{
      font-size:.95rem;
      font-weight:900;
      flex:1;
      min-width:0;
      word-break:break-word;
    }
    .player-score{
      font-size:1.1rem;
      font-weight:900;
      color:#fff;
      white-space:nowrap;
      min-width:3ch;
      text-align:right;
      flex-shrink:0;
    }
    .round-row{
      display:flex;
      align-items:center;
      gap:4px;
      width:100%;
    }
    .round-input{
      width:90px;
      min-width:0;
      text-align:center;
      font-weight:700;
      flex-shrink:0;
    }
    .small-btn{
      min-height:36px;
      min-width:36px;
      padding:0 10px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      color:#fff;
      font-weight:900;
      line-height:1;
      touch-action:manipulation;
    }
    .small-add{background:var(--accent-green)}
    .small-sub{background:var(--danger)}
    .leaderboard-section{
      padding:0;
      margin-bottom:12px;
    }
    .leaderboard-title{
      font-size:.95rem;
      font-weight:900;
      color:var(--accent-green);
      margin-bottom:6px;
      text-align:center;
      cursor:pointer;
      user-select:none;
    }
    .leaderboard-grid{
      display:grid;
      gap:4px;
      grid-template-columns:repeat(auto-fill,minmax(min(100%,220px),1fr));
    }
    .leaderboard-item{
      position:relative;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 12px;
      background:rgba(15,23,42,.6);
      border:1px solid rgba(51,65,85,.5);
      border-radius:12px;
      font-size:1.3rem;
      gap:4px;
      font-weight:700;
      overflow:hidden;
    }
    .leaderboard-progress{
      position:absolute;
      left:0; top:0; bottom:0;
      background:rgba(34,197,94,.25);
      border-radius:8px;
      transition:width .4s ease;
      pointer-events:none;
    }
    .leaderboard-rank,.leaderboard-name,.leaderboard-score{
      position:relative;
      z-index:1;
    }
    .leaderboard-rank{
      color:var(--accent-green);
      width:22px;
      text-align:center;
      font-weight:900;
      font-size:1.3rem;
      flex-shrink:0;
    }
    .leaderboard-name{
      flex:1;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      padding-left:4px;
      min-width:0;
    }
    .leaderboard-score{
      color:#fff;
      font-weight:900;
      min-width:3ch;
      text-align:right;
      font-size:1.3rem;
    }
    .winner-panel{display:grid; gap:10px}
    .winner-title{
      font-size:1.05rem;
      font-weight:900;
      color:#fef9c3;
    }
    .winner-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .known-trash-btn{
      min-height:32px;
      padding:4px 10px;
      font-size:1rem;
      background:transparent;
      border:1px solid rgba(51,65,85,.7);
      border-radius:8px;
      cursor:pointer;
      opacity:.6;
      transition:opacity .15s, border-color .15s;
    }
    .known-trash-btn.active{
      opacity:1;
      border-color:#ef4444;
      background:rgba(239,68,68,.12);
    }
    .known-chip.delete-mode{
      border-color:#ef4444;
      color:#fca5a5;
      cursor:pointer;
    }
    .known-chip.delete-mode:hover{
      background:rgba(239,68,68,.2);
    }
    .known-chip{
      padding:7px 14px;
      border-radius:999px;
      border:1px solid rgba(51,65,85,.9);
      background:rgba(2,6,23,.4);
      color:#e5e7eb;
      font-weight:700;
      cursor:pointer;
      font-size:.9rem;
      transition:opacity .15s, background .15s;
    }
    .known-chip.used{
      opacity:.4;
      background:rgba(51,65,85,.3);
    }
    /* Logo Flip 7 style */
    .game-logo{
      display:inline-flex;
      align-items:center;
      gap:10px;
    }
    .flip7-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;
      height:40px;
      border-radius:10px;
      background:linear-gradient(135deg,#f59e0b,#d97706);
      color:#0b1220;
      font-weight:900;
      font-size:1.1rem;
      box-shadow:0 3px 10px rgba(245,158,11,.4);
    }
    @media (max-width:900px){
      .layout-play{grid-template-columns:1fr}
    }
    @media (max-width:640px){
      .app{padding:8px; gap:8px}
      .section{padding:10px}
      .players-grid{grid-template-columns:1fr}

    }

    .detail-section{
      margin-top:12px;
      background:rgba(15,23,42,.72);
      border:1px solid rgba(51,65,85,.9);
      border-radius:var(--radius);
      padding:0;
      overflow:hidden;
    }
    .detail-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 16px;
      cursor:pointer;
      user-select:none;
      font-weight:900;
      font-size:.95rem;
      color:#94a3b8;
    }
    .detail-title:hover{background:rgba(51,65,85,.2)}
    .detail-chevron{color:#94a3b8; transition:transform .25s; font-size:1rem}
    .detail-chevron.open{transform:rotate(90deg)}
    .detail-body{display:none; padding:0 12px 12px}
    .detail-body.open{display:block}
    .detail-table{
      width:max-content;
      min-width:100%;
      border-collapse:collapse;
      font-size:.82rem;
    }
    .detail-table th{
      padding:6px 8px;
      text-align:center;
      color:#64748b;
      font-weight:700;
      border-bottom:1px solid rgba(51,65,85,.7);
      position:sticky;
      top:0;
      background:rgba(15,23,42,.95);
      white-space:nowrap;
    }
    .detail-table th.player-th{
      max-width:90px;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .detail-table td{
      padding:5px 8px;
      text-align:center;
      border-bottom:1px solid rgba(51,65,85,.3);
      font-weight:700;
    }
    .detail-table td.round-label{
      color:#64748b;
      font-weight:800;
      white-space:nowrap;
      font-variant-numeric:tabular-nums;
      font-family:ui-monospace,monospace;
    }
    .detail-sticky-col{
      position:sticky;
      left:0;
      z-index:2;
      background:rgba(15,23,42,.97);
      font-weight:800;
      white-space:nowrap;
      text-align:left !important;
      padding-right:12px !important;
      max-width:110px;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    thead .detail-sticky-col{

<body>
  <div class="app">
    <div class="section" id="setupSection">
      <h1>

  <script>
    let selectedPlayerCount = 4;
    const startGameBtn = document.getElementById('startGameBtn');
    const playerNameInputs = document.getElementById('playerNameInputs');
    const setupSection = document.getElementById('setupSection');
    const gameView = document.getElementById('gameView');
    const playersGrid = document.getElementById('playersGrid');
    const gameStatus = document.getElementById('gameStatus');
    const winnerPanel = document.getElementById('winnerPanel');
    const winnerText = document.getElementById('winnerText');
    const restartSameBtn = document.getElementById('restartSameBtn');
    const backHomeBtn = document.getElementById('backHomeBtn');
    const cancelRoundBtn = document.getElementById('cancelRoundBtn');
    const roundNumber = document.getElementById('roundNumber');
    const leaderboardSection = document.getElementById('leaderboardSection');
    const leaderboardList = document.getElementById('leaderboardList');
    const nextRoundBtnBottom = document.getElementById('nextRoundBtnBottom');
    const cancelRoundBtnBottom = document.getElementById('cancelRoundBtnBottom');

    let players = [];
    let gameOver = false;
    let round = 1;
    // roundPending[i] = score saisi pour la manche en cours pour le joueur i (null = pas saisi)
    let roundPending = [];
    let knownPlayers = JSON.parse(localStorage.getItem('flip7_known_players') || '[]');
    let knownPlayersUsage = JSON.parse(localStorage.getItem('flip7_known_usage') || '{}');
    let trashMode = false;
    let sortByRecent = true;

    // Historique complet : roundHistory[m][i] = score du joueur i à la fin de la manche m (0-indexed)
    // roundHistory[m] est un tableau de scores CUMULÉS après la manche m
    let roundHistory = [];
    // roundInputHistory[m][i] = valeur saisie pour le joueur i à la manche m
    let roundInputHistory = [];

    // 18 couleurs joueurs — teintes vives bien distinctes + blanc/gris pour compléter
    const PLAYER_COLORS = [
      "#60a5fa", // bleu
      "#f472b6", // rose
      "#4ade80", // vert vif
      "#f87171", // rouge clair
      "#a78bfa", // violet
      "#22d3ee", // cyan
      "#fb923c", // orange
      "#e879f9", // magenta
      "#34d399", // vert menthe
      "#818cf8", // indigo
      "#fbbf24", // ambre
      "#f43f5e", // rouge framboise
      "#ffffff", // blanc
      "#cbd5e1", // gris clair
      "#94a3b8", // gris moyen
      "#64748b", // gris ardoise
      "#38bdf8", // bleu ciel
      "#86efac", // vert pâle
    ];

    // Chrono
    let chronoSeconds = 0;
    let chronoPaused = false;
    let chronoInterval = null;
    const chronoBtn = document.getElementById('chronoBtn');

    function formatChrono(s) {
      const mins = Math.round(s / 60);
      return mins + ' min';
    }

    function updateChronoDisplay() {
      if (chronoPaused) {
        chronoBtn.textContent = '⏸ ' + formatChrono(chronoSeconds);
        chronoBtn.classList.add('paused');
      } else {
        chronoBtn.textContent = formatChrono(chronoSeconds);
        chronoBtn.classList.remove('paused');
      }
    }

    function startChrono() {
      chronoSeconds = 0;
      chronoPaused = false;
      clearInterval(chronoInterval);
      updateChronoDisplay();
      chronoInterval = setInterval(() => {
        if (!chronoPaused) { chronoSeconds++; updateChronoDisplay(); }
      }, 1000);
    }

    function stopChrono() {
      clearInterval(chronoInterval);
      chronoInterval = null;
    }

    chronoBtn.addEventListener('click', () => {
      if (!chronoInterval && !chronoPaused) return;
      chronoPaused = !chronoPaused;
      updateChronoDisplay();
    });

    // ---- Saisie des scores ----

    // Score de base du joueur i = scores cumulés jusqu'à la manche précédente
    function baseScore(i) {
      if (round <= 1) return 0;
      return roundHistory[round - 2] ? (roundHistory[round - 2][i] ?? 0) : 0;
    }

    // Score total actuel du joueur i (base + pending si saisi)
    function currentScore(i) {
      const pending = roundPending[i];
      return baseScore(i) + (pending !== null && pending !== undefined ? pending : 0);
    }

    function updateScores() {
      players.forEach((_, i) => {
        const el = document.getElementById(`score-${i}`);
        if (el) el.textContent = currentScore(i);
      });
    }

    function setInputsDisabled(disabled) {
      players.forEach((_, i) => {
        const input = document.getElementById(`round-${i}`);
        const addBtn = document.querySelector(`[onclick="addRoundPoints(${i})"]`);
        const subBtn = document.querySelector(`[onclick="subtractRoundPoints(${i})"]`);
        const calcBtn = document.getElementById(`calc-icon-${i}`);
        if (input) { input.disabled = disabled; input.style.opacity = disabled ? '0.4' : ''; }
        if (addBtn) { addBtn.disabled = disabled; addBtn.style.opacity = disabled ? '0.4' : ''; }
        if (subBtn) { subBtn.disabled = disabled; subBtn.style.opacity = disabled ? '0.4' : ''; }
        if (calcBtn) { calcBtn.disabled = disabled; calcBtn.style.opacity = disabled ? '0.35' : ''; calcBtn.style.pointerEvents = disabled ? 'none' : ''; }
      });
    }

    function focusNext(index) {
      const next = document.getElementById(`round-${index + 1}`);
      if (next && !next.disabled) { next.focus(); next.select(); }
    }

    window.applyRoundPoints = function(index, skipFocus) {
      if (gameOver) return;
      const input = document.getElementById(`round-${index}`);
      const value = parseInt(input.value, 10);
      if (Number.isNaN(value)) return;
      // Conserver la valeur dans le champ (ne pas effacer)
      roundPending[index] = value;
      updateScores();
      if (!skipFocus) focusNext(index);
    };

    window.addRoundPoints = function(index) {
      applyRoundPoints(index, false);
    };

    window.subtractRoundPoints = function(index) {
      if (gameOver) return;
      const input = document.getElementById(`round-${index}`);
      const value = parseInt(input.value, 10);
      if (Number.isNaN(value)) return;
      roundPending[index] = -value;
      // Afficher la valeur négative dans le champ
      input.value = -value;
      updateScores();
      focusNext(index);
    };

    function renderPlayers() {
      playersGrid.innerHTML = '';
      players.forEach((player, index) => {
        const color = PLAYER_COLORS[index % PLAYER_COLORS.length];
        const card = document.createElement('div');
        card.className = 'player-card';
        // Restaurer la valeur saisie pour cette manche si elle existe
        const pendingVal = roundPending[index];
        const inputVal = (pendingVal !== null && pendingVal !== undefined) ? pendingVal : '';
        card.innerHTML = `
          <div class="round-row">
            <div class="player-name" style="color:${color}" title="${player.name}">${player.name}</div>
            <button class="calc-btn-icon" type="button" id="calc-icon-${index}" onclick="openCalc(${index})" title="Calculer le score">🧮</button>
            <input class="round-input" type="number" inputmode="decimal" id="round-${index}" placeholder="Points" value="${inputVal}">
            <button class="small-btn small-add" type="button" onclick="addRoundPoints(${index})">+</button>
            <button class="small-btn small-sub" type="button" onclick="subtractRoundPoints(${index})">-</button>
            <div class="player-score" id="score-${index}">${currentScore(index)}</div>
          </div>
        `;
        playersGrid.appendChild(card);
        // Appliquer calc-used si une sélection existe pour ce joueur+manche
        const calcIconEl = card.querySelector('#calc-icon-' + index);
        if (calcIconEl && calcSavedSel && calcSavedSel[round + '-' + index]) {
          calcIconEl.classList.add('calc-used');
        }
        const input = card.querySelector(`#round-${index}`);
        input.addEventListener('focus', () => {
          input.select();
          // Scroll immédiat pour les navigateurs desktop
          input.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Sur iOS, le clavier virtuel s'ouvre après le focus et redimensionne le viewport
          // On re-scrolle dès que le viewport change (clavier ouvert)
          if (window.visualViewport) {
            const onResize = () => {
              input.scrollIntoView({ behavior: 'smooth', block: 'center' });
              window.visualViewport.removeEventListener('resize', onResize);
            };
            window.visualViewport.addEventListener('resize', onResize);
            // Nettoyage au blur si le clavier ne s'est pas ouvert
            input.addEventListener('blur', () => {
              window.visualViewport.removeEventListener('resize', onResize);
            }, { once: true });
          }
        });
        input.addEventListener('input', () => {
          const val = parseInt(input.value, 10);
          const el = document.getElementById(`score-${index}`);
          if (!el) return;
          if (Number.isNaN(val)) {
            el.textContent = baseScore(index);
          } else {
            el.textContent = baseScore(index) + val;
          }
        });
        input.addEventListener('keydown', (e) => {
          if (e.key !== 'Enter') return;
          e.preventDefault();
          applyRoundPoints(index, true);
          focusNext(index);
        });
      });
      if (gameOver) setInputsDisabled(true);
    }

    // ---- Leaderboard ----

    let leaderboardSortAlpha = false;

    function updateLeaderboard() {
      const byScore = [...players].sort((a, b) => currentScore(players.indexOf(b)) - currentScore(players.indexOf(a)));
      const rankMap = new Map();
      byScore.forEach((p, i) => rankMap.set(p, i + 1));
      const displayed = leaderboardSortAlpha
        ? [...players].sort((a, b) => a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }))
        : byScore;
      leaderboardList.innerHTML = '';
      displayed.forEach((player) => {
        const item = document.createElement('div');
        item.className = 'leaderboard-item';
        const score = currentScore(players.indexOf(player));
        const pct = Math.min(Math.max(score, 0), 200) / 2;
        const playerColor = PLAYER_COLORS[players.indexOf(player) % PLAYER_COLORS.length];
        const rank = rankMap.get(player);
        item.innerHTML = `
          <div class="leaderboard-progress" style="width:${pct}%"></div>
          <span class="leaderboard-rank">${rank}.</span>
          <span class="leaderboard-name" style="color:${playerColor}">${player.name}</span>
          <span class="leaderboard-score">${score}</span>
        `;
        leaderboardList.appendChild(item);
      });
    }

    function updateScoresAndLeaderboard() {
      updateScores();
      updateLeaderboard();
      const body = document.getElementById('detailBody');
      if (body && body.classList.contains('open')) updateDetailTable();
    }

    document.getElementById('leaderboardTitle').addEventListener('click', () => {
      leaderboardSortAlpha = !leaderboardSortAlpha;
      updateLeaderboard();
    });

    // ---- Navigation entre manches ----

    function checkWinnerAtEndOfRound() {
      const eligible = players.filter((_, i) => currentScore(i) >= 200);
      if (!eligible.length) return false;
      const scores = players.map((_, i) => currentScore(i));
      const topScore = Math.max(...scores);
      const winners = players.filter((_, i) => scores[i] === topScore);
      gameOver = true;
      stopChrono();
      setInputsDisabled(true);
      const now = Date.now();
      players.forEach(p => {
        if (!knownPlayers.includes(p.name)) knownPlayers.push(p.name);
        knownPlayersUsage[p.name] = now;
      });
      localStorage.setItem('flip7_known_players', JSON.stringify(knownPlayers));
      localStorage.setItem('flip7_known_usage', JSON.stringify(knownPlayersUsage));
      winnerPanel.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      nextRoundBtnBottom.classList.add('hidden');
      if (winners.length === 1) {
        winnerText.textContent = `🎉 Partie terminée. Gagnant : ${winners[0].name} avec ${topScore} points !`;
      } else {
        const names = winners.map(w => w.name).join(', ');
        winnerText.textContent = `🎉 Partie terminée. Égalité ! Gagnants : ${names} avec ${topScore} points.`;
      }
      gameStatus.textContent = 'La partie est terminée.';
      return true;
    }

    function nextRound() {
      if (gameOver) return;
      // Appliquer les valeurs encore dans les champs non validés (priorité au champ courant)
      players.forEach((_, i) => {
        const input = document.getElementById(`round-${i}`);
        const val = parseInt(input?.value, 10);
        if (!Number.isNaN(val)) roundPending[i] = val;
      });

      // Sauvegarder les inputs de cette manche
      roundInputHistory[round - 1] = [...roundPending];

      // Recalculer roundHistory en cascade à partir de cette manche
      // (nécessaire si on a modifié une manche passée)
      recalcHistoryFrom(round - 1);

      updateScoresAndLeaderboard();
      if (checkWinnerAtEndOfRound()) return;

      // Restaurer les inputs de la manche suivante si elle existe déjà
      roundPending = roundInputHistory[round]
        ? [...roundInputHistory[round]]
        : players.map(() => null);

      round += 1;
      roundNumber.textContent = round;
      gameStatus.textContent = `Manche ${round - 1} terminée. Manche ${round} en cours.`;
      initCurrentRoundInHistory();
      renderPlayers();
      updateScoresAndLeaderboard();
      scrollToFirstInput();
    }

    // Recalcule roundHistory à partir de la manche fromIdx (0-indexed) jusqu'à la dernière connue
    function recalcHistoryFrom(fromIdx) {
      for (let m = fromIdx; m < roundInputHistory.length; m++) {
        const inputs = roundInputHistory[m];
        if (!inputs) break;
        const prev = m > 0 ? (roundHistory[m - 1] || players.map(() => 0)) : players.map(() => 0);
        roundHistory[m] = players.map((_, i) => {
          const v = inputs[i];
          return prev[i] + (v !== null && v !== undefined ? v : 0);
        });
      }
    }

    // Initialise une entrée vide pour la manche courante dans l'historique si elle n'existe pas
    function initCurrentRoundInHistory() {
      if (!roundInputHistory[round - 1]) {
        roundInputHistory[round - 1] = players.map(() => null);
      }
    }

    function prevRound() {
      if (round <= 1 && !gameOver) return;

      if (gameOver) {
        // La victoire a été déclenchée à la fin de la manche `round`.
        // On reste sur la manche `round` mais on restaure sa saisie.
        gameOver = false;
        startChrono();
        winnerPanel.classList.add('hidden');
        nextRoundBtnBottom.classList.remove('hidden');
        // Restaurer les inputs de cette manche
        roundPending = roundInputHistory[round - 1]
          ? [...roundInputHistory[round - 1]]
          : players.map(() => null);
        setInputsDisabled(false);
        gameStatus.textContent = `Manche ${round} en cours.`;
        renderPlayers();
        updateScoresAndLeaderboard();
        scrollToFirstInput();
        return;
      }

      if (round <= 1) return;

      // Sauvegarder le pending courant avant de reculer
      roundInputHistory[round - 1] = [...roundPending];

      round -= 1;
      roundNumber.textContent = round;

      // Restaurer les inputs de la manche précédente
      roundPending = roundInputHistory[round - 1]
        ? [...roundInputHistory[round - 1]]
        : players.map(() => null);

      nextRoundBtnBottom.classList.remove('hidden');
      gameStatus.textContent = `Manche ${round} en cours.`;
      renderPlayers();
      updateScoresAndLeaderboard();
    }

    function scrollToFirstInput() {
      const first = document.getElementById('round-0');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ---- Setup ----

    function startFromSetup() {
      const count = selectedPlayerCount;
      players = [];
      let hasEmpty = false;
      for (let i = 0; i < count; i++) {
        const input = document.getElementById(`playerName${i}`);
        if (!input || !input.value.trim()) {
          hasEmpty = true;
          if (input) {
            input.style.borderColor = '#ef4444';
            input.style.boxShadow = '0 0 0 2px rgba(239,68,68,.3)';
            input.placeholder = 'Nom requis !';
          }
        } else {
          if (input) { input.style.borderColor = ''; input.style.boxShadow = ''; }
          players.push({ name: input.value.trim() });
        }
      }
      if (hasEmpty) return;
      roundPending = players.map(() => null);
      roundHistory = [];
      roundInputHistory = [];
      calcSavedSel = {};
      gameOver = false;
      round = 1;
      roundNumber.textContent = round;
      setupSection.classList.add('hidden');
      gameView.classList.remove('hidden');
      winnerPanel.classList.add('hidden');
      nextRoundBtnBottom.classList.remove('hidden');
      gameStatus.textContent = 'La partie est en cours.';
      startChrono();
      initCurrentRoundInHistory();
      renderPlayers();
      updateScoresAndLeaderboard();
    }

    function restartSamePlayers() {
      roundPending = players.map(() => null);
      roundHistory = [];
      roundInputHistory = [];
      calcSavedSel = {};
      gameOver = false;
      round = 1;
      roundNumber.textContent = round;
      winnerPanel.classList.add('hidden');
      nextRoundBtnBottom.classList.remove('hidden');
      gameStatus.textContent = 'La partie est relancée avec les mêmes joueurs.';
      initCurrentRoundInHistory();
      renderPlayers();
      updateScoresAndLeaderboard();
      startChrono();
      scrollToFirstInput();
    }

    function backHome() {
      players = [];
      roundPending = [];
      roundHistory = [];
      roundInputHistory = [];
      calcSavedSel = {};
      gameOver = false;
      round = 1;
      roundNumber.textContent = round;
      winnerPanel.classList.add('hidden');
      gameView.classList.add('hidden');
      setupSection.classList.remove('hidden');
      stopChrono();
      updateLeaderboard();
      renderPlayerInputs();
      playerNameInputs.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ---- Écran d'accueil ----

    function renderPlayerInputs() {
      const count = selectedPlayerCount;
      const previousNames = [];
      for (let i = 0; ; i++) {
        const input = document.getElementById(`playerName${i}`);
        if (!input) break;
        previousNames.push(input.value);
      }
      playerNameInputs.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Joueur ${i + 1}`;
        const prev = previousNames[i];
        input.value = (prev !== undefined && !/^Joueur \d+$/.test(prev)) ? prev : '';
        input.id = `playerName${i}`;
        input.addEventListener('focus', () => {
          input.select();
        });
        input.addEventListener('input', () => {
          if (input.value.trim()) {
            input.style.borderColor = '';
            input.style.boxShadow = '';
            input.placeholder = `Joueur ${i + 1}`;
          }
        });
        input.addEventListener('keydown', (e) => {
          if (e.key !== 'Enter') return;
          e.preventDefault();
          const next = document.getElementById(`playerName${i + 1}`);
          if (next) { next.focus(); next.select(); }
          else document.getElementById('startGameBtn')?.focus();
        });
        playerNameInputs.appendChild(input);
      }
      renderKnownPlayers();
    }

    function getUsedNames() {
      const count = selectedPlayerCount;
      const used = [];
      for (let i = 0; i < count; i++) {
        const input = document.getElementById(`playerName${i}`);
        if (input && input.value.trim()) used.push(input.value.trim());
      }
      return used;
    }

    function renderKnownPlayers() {
      const block = document.getElementById('knownPlayersBlock');
      const list = document.getElementById('knownPlayersList');
      const trashBtn = document.getElementById('trashModeBtn');
      const sortBtn = document.getElementById('sortModeBtn');
      if (!knownPlayers.length) { block.classList.add('hidden'); trashMode = false; return; }
      block.classList.remove('hidden');
      if (trashBtn) trashBtn.classList.toggle('active', trashMode);
      if (sortBtn) {
        sortBtn.classList.toggle('active', sortByRecent);
        sortBtn.textContent = sortByRecent ? '🕐' : '🔤';
        sortBtn.title = sortByRecent ? 'Tri : récent — cliquer pour alphabétique' : 'Tri : alphabétique — cliquer pour récent';
      }
      const sorted = [...knownPlayers].sort((a, b) => {
        if (sortByRecent) return (knownPlayersUsage[b] || 0) - (knownPlayersUsage[a] || 0);
        return a.localeCompare(b, 'fr', { sensitivity: 'base' });
      });
      list.innerHTML = '';
      const usedNames = getUsedNames();
      sorted.forEach(name => {
        const chip = document.createElement('button');
        chip.type = 'button';
        if (trashMode) {
          chip.className = 'known-chip delete-mode';
          chip.textContent = '✕ ' + name;
          chip.addEventListener('click', () => {
            knownPlayers = knownPlayers.filter(n => n !== name);
            localStorage.setItem('flip7_known_players', JSON.stringify(knownPlayers));
            const count = selectedPlayerCount;
            for (let i = 0; i < count; i++) {
              const input = document.getElementById(`playerName${i}`);
              if (input && input.value === name) input.value = '';
            }
            if (!knownPlayers.length) trashMode = false;
            renderKnownPlayers();
          });
        } else {
          chip.className = 'known-chip' + (usedNames.includes(name) ? ' used' : '');
          chip.textContent = name;
          chip.addEventListener('click', () => {
            const count = selectedPlayerCount;
            const usedNow = getUsedNames();
            if (usedNow.includes(name)) {
              for (let i = 0; i < count; i++) {
                const input = document.getElementById(`playerName${i}`);
                if (input && input.value === name) { input.value = ''; break; }
              }
            } else {
              for (let i = 0; i < count; i++) {
                const input = document.getElementById(`playerName${i}`);
                if (input && input.value.trim() === '') { input.value = name; break; }
              }
            }
            renderKnownPlayers();
          });
        }
        list.appendChild(chip);
      });
    }

    document.getElementById('trashModeBtn').addEventListener('click', () => {
      trashMode = !trashMode;
      renderKnownPlayers();
    });

    document.getElementById('sortModeBtn').addEventListener('click', () => {
      sortByRecent = !sortByRecent;
      renderKnownPlayers();
    });


    // ---- Tableau détail des manches ----

    function updateDetailTable() {
      const table = document.getElementById('detailTable');
      if (!table) return;
      table.innerHTML = '';

      const totalRounds = roundInputHistory.length;

      function deltaCell(v, cumul) {
        const td = document.createElement('td');
        const deltaStr = (v !== null && v !== undefined) ? (v >= 0 ? '+' + v : String(v)) : '—';
        const cumulStr = (cumul !== null && cumul !== undefined) ? ` (${cumul})` : '';
        td.innerHTML = `<span style="color:${v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#94a3b8'}">${deltaStr}</span><span style="color:#64748b;font-size:.78rem">${cumulStr}</span>`;
        return td;
      }

      // Toujours : joueurs en lignes, manches en colonnes, 1ère colonne sticky
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');

      // Coin supérieur gauche sticky
      const thCorner = document.createElement('th');
      thCorner.className = 'detail-sticky-col';
      thCorner.textContent = '';
      headerRow.appendChild(thCorner);

      for (let m = 0; m < totalRounds; m++) {
        if (!roundInputHistory[m]) continue;
        const th = document.createElement('th');
        th.textContent = `${m + 1}`;
        if (m === round - 1) th.style.color = 'var(--accent-green)';
        headerRow.appendChild(th);
      }
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      players.forEach((p, i) => {
        const row = document.createElement('tr');

        // Cellule nom — sticky
        const tdName = document.createElement('td');
        tdName.className = 'detail-sticky-col';
        tdName.style.color = PLAYER_COLORS[i % PLAYER_COLORS.length];
        tdName.textContent = p.name;
        tdName.title = p.name;
        row.appendChild(tdName);

        for (let m = 0; m < totalRounds; m++) {
          const inputs = roundInputHistory[m];
          if (!inputs) continue;
          const scores = roundHistory[m];
          const td = deltaCell(inputs[i], scores ? scores[i] : null);
          if (m === round - 1) td.style.background = 'rgba(34,197,94,.08)';
          row.appendChild(td);
        }
        tbody.appendChild(row);
      });
      table.appendChild(tbody);

      // Faire défiler pour que la manche en cours soit visible
      scrollCurrentRoundIntoView();
    }

    function scrollCurrentRoundIntoView() {
      const body = document.getElementById('detailBody');
      if (!body || !body.classList.contains('open')) return;
      const table = document.getElementById('detailTable');
      if (!table) return;
      // Colonne de la manche en cours : index = round (0=sticky nom, 1=manche1, ...)
      const headerCells = table.querySelectorAll('thead th');
      const targetCell = headerCells[round];
      if (!targetCell) return;
      const wrap = body.querySelector('div');
      if (!wrap) return;
      const wrapRect = wrap.getBoundingClientRect();
      const cellRect = targetCell.getBoundingClientRect();
      const cellLeft = cellRect.left - wrapRect.left + wrap.scrollLeft;
      const cellCenter = cellLeft - wrap.clientWidth / 2 + cellRect.width / 2;
      wrap.scrollTo({ left: Math.max(0, cellCenter), behavior: 'smooth' });
    }

    document.getElementById('detailToggle').addEventListener('click', () => {
      const body = document.getElementById('detailBody');
      const chevron = document.getElementById('detailChevron');
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      chevron.classList.toggle('open', !isOpen);
      if (!isOpen) updateDetailTable();
    });
    document.querySelectorAll('.player-count-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedPlayerCount = parseInt(btn.dataset.count, 10);
        document.querySelectorAll('.player-count-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPlayerInputs();
      });
    });

    startGameBtn.onclick = startFromSetup;
    restartSameBtn.onclick = restartSamePlayers;
    backHomeBtn.onclick = backHome;
    cancelRoundBtn.onclick = prevRound;
    cancelRoundBtnBottom.onclick = prevRound;
    nextRoundBtnBottom.onclick = nextRound;

    renderPlayerInputs();

    // ── Calculateur de score Flip 7 ──
    const CALC_NUMBER_CARDS = [
      { value: 0,  label: '0',   bg: '#e91e8c', textColor: '#fff' },          // conservé
      { value: 1,  label: '1',   bg: '#b0a0b8', textColor: '#fff' },          // gris-mauve
      { value: 2,  label: '2',   bg: '#b8c820', textColor: '#1a1200' },       // jaune-vert
      { value: 3,  label: '3',   bg: '#e83060', textColor: '#fff' },          // rouge-rose
      { value: 4,  label: '4',   bg: '#3fbfcf', textColor: '#0a1929' },       // bleu-cyan
      { value: 5,  label: '5',   bg: '#3aaa5a', textColor: '#fff' },          // vert émeraude
      { value: 6,  label: '6',   bg: '#9b3f9e', textColor: '#fff' },          // violet
      { value: 7,  label: '7',   bg: '#e8786a', textColor: '#fff' },          // conservé rose-saumon
      { value: 8,  label: '8',   bg: '#5ab44a', textColor: '#fff' },          // vert
      { value: 9,  label: '9',   bg: '#f5821f', textColor: '#fff' },          // orange
      { value: 10, label: '10',  bg: '#e63022', textColor: '#fff' },          // rouge vif
      { value: 11, label: '11',  bg: '#7b9fd4', textColor: '#0a1929' },       // bleu clair lavande
      { value: 12, label: '12',  bg: '#7a6a5a', textColor: '#fff' },          // gris-brun
      { value: 13, label: '13',  bg: '#1a6fc4', textColor: '#fff' },          // bleu (thirteen)
      { value: 13, label: '13✶', bg: 'linear-gradient(135deg,#e91e8c,#9c27b0,#2196f3,#43a047,#ff9800)', textColor: '#fff' }, // lucky
    ];
    const CALC_BONUS_CARDS = [
      { value: 'x2', label: '×2',  bg: 'linear-gradient(160deg,#d97706,#b45309)', textColor: '#fff' },
      { value: 2,    label: '+2',   bg: 'linear-gradient(160deg,#d97706,#b45309)', textColor: '#fff' },
      { value: 4,    label: '+4',   bg: 'linear-gradient(160deg,#d97706,#b45309)', textColor: '#fff' },
      { value: 6,    label: '+6',   bg: 'linear-gradient(160deg,#d97706,#b45309)', textColor: '#fff' },
      { value: 8,    label: '+8',   bg: 'linear-gradient(160deg,#d97706,#b45309)', textColor: '#fff' },
      { value: 10,   label: '+10',  bg: 'linear-gradient(160deg,#d97706,#b45309)', textColor: '#fff' },
    ];
    const CALC_MALUS_CARDS = [
      { value: 'd2', label: '÷2',  bg: 'linear-gradient(160deg,#c0392b,#922b21)', textColor: '#fff' },
      { value: -2,   label: '−2',  bg: 'linear-gradient(160deg,#c0392b,#922b21)', textColor: '#fff' },
      { value: -4,   label: '−4',  bg: 'linear-gradient(160deg,#c0392b,#922b21)', textColor: '#fff' },
      { value: -6,   label: '−6',  bg: 'linear-gradient(160deg,#c0392b,#922b21)', textColor: '#fff' },
      { value: -8,   label: '−8',  bg: 'linear-gradient(160deg,#c0392b,#922b21)', textColor: '#fff' },
      { value: -10,  label: '−10', bg: 'linear-gradient(160deg,#c0392b,#922b21)', textColor: '#fff' },
    ];

    let calcPlayerIndex = -1;
    let calcNumSel   = new Array(CALC_NUMBER_CARDS.length).fill(0);
    let calcBonusSel = new Array(CALC_BONUS_CARDS.length).fill(0);
    let calcMalusSel = new Array(CALC_MALUS_CARDS.length).fill(0);

    function calcCompute() {
      let numSum = 0, numCount = 0;
      CALC_NUMBER_CARDS.forEach((c, i) => { numSum += c.value * calcNumSel[i]; numCount += calcNumSel[i]; });
      const isFlip7 = numCount >= 7;
      const hasX2 = calcBonusSel[0] > 0;
      const hasD2 = calcMalusSel[0] > 0;
      let total = hasX2 ? numSum * 2 : numSum;
      if (hasD2) total = Math.floor(total / 2);
      for (let i = 1; i < CALC_BONUS_CARDS.length; i++) total += CALC_BONUS_CARDS[i].value * calcBonusSel[i];
      for (let i = 1; i < CALC_MALUS_CARDS.length; i++) total += CALC_MALUS_CARDS[i].value * calcMalusSel[i];
      if (isFlip7) total += 15;
      document.getElementById('calcTotalValue').textContent = total;
      document.getElementById('calcFlip7Badge').classList.toggle('visible', isFlip7);
      const parts = [];
      if (numCount > 0) parts.push('Nombres : ' + numSum);
      if (hasX2) parts.push('×2');
      if (hasD2) parts.push('÷2');
      for (let i = 1; i < CALC_BONUS_CARDS.length; i++) { if (calcBonusSel[i]) parts.push(CALC_BONUS_CARDS[i].label); }
      for (let i = 1; i < CALC_MALUS_CARDS.length; i++) { if (calcMalusSel[i]) parts.push(CALC_MALUS_CARDS[i].label); }
      if (isFlip7) parts.push('Flip7 +15');
      document.getElementById('calcDetail').textContent = parts.join(' → ');
      return total;
    }

    function calcUpdateUI() {
      const totalNum = calcNumSel.reduce((a, b) => a + b, 0);
      document.querySelectorAll('.calc-num-card').forEach((el, i) => {
        el.classList.toggle('selected', calcNumSel[i] > 0);
        el.classList.toggle('disabled-card', totalNum >= 7 && calcNumSel[i] === 0);

      });
      document.querySelectorAll('.calc-bonus-card-el').forEach((el, i) => {
        el.classList.toggle('selected', calcBonusSel[i] > 0);

      });
      document.querySelectorAll('.calc-malus-card-el').forEach((el, i) => {
        el.classList.toggle('selected', calcMalusSel[i] > 0);

      });
      calcCompute();
    }

    function buildCalcCards() {
      const numGrid = document.getElementById('calcNumberCards');
      numGrid.innerHTML = '';
      CALC_NUMBER_CARDS.forEach((c, i) => {
        const el = document.createElement('button');
        el.type = 'button'; el.className = 'calc-card calc-num-card';
        el.style.background = c.bg; el.style.color = c.textColor;
        el.innerHTML = '<span>' + c.label + '</span>';
        el.addEventListener('click', () => {
          const tot = calcNumSel.reduce((a, b) => a + b, 0);
          if (calcNumSel[i] > 0) calcNumSel[i]--;
          else if (tot < 7) calcNumSel[i]++;
          calcUpdateUI();
        });
        numGrid.appendChild(el);
      });
      const bonusGrid = document.getElementById('calcBonusCards');
      bonusGrid.innerHTML = '';
      CALC_BONUS_CARDS.forEach((c, i) => {
        const el = document.createElement('button');
        el.type = 'button'; el.className = 'calc-card calc-bonus-card-el';
        el.style.background = c.bg; el.style.color = c.textColor;
        el.innerHTML = '<span>' + c.label + '</span>';
        el.addEventListener('click', () => { calcBonusSel[i] = calcBonusSel[i] > 0 ? 0 : 1; calcUpdateUI(); });
        bonusGrid.appendChild(el);
      });
      const malusGrid = document.getElementById('calcMalusCards');
      malusGrid.innerHTML = '';
      CALC_MALUS_CARDS.forEach((c, i) => {
        const el = document.createElement('button');
        el.type = 'button'; el.className = 'calc-card calc-malus-card-el';
        el.style.background = c.bg; el.style.color = c.textColor;
        el.innerHTML = '<span>' + c.label + '</span>';
        el.addEventListener('click', () => { calcMalusSel[i] = calcMalusSel[i] > 0 ? 0 : 1; calcUpdateUI(); });
        malusGrid.appendChild(el);
      });
    }

    // Sauvegarder la sélection par joueur
    let calcSavedSel = {};

    window.openCalc = function(playerIndex) {
      if (gameOver) return;
      calcPlayerIndex = playerIndex;
      const color = PLAYER_COLORS[playerIndex % PLAYER_COLORS.length];
      const nameEl = document.getElementById('calcPlayerName');
      if (!nameEl) return;
      nameEl.textContent = players[playerIndex].name;
      nameEl.style.color = color;
      // Restaurer la sélection précédente pour ce joueur+manche si elle existe
      const calcKey = round + '-' + playerIndex;
      const saved = calcSavedSel[calcKey];
      if (saved) {
        calcNumSel   = [...saved.num];
        calcBonusSel = [...saved.bonus];
        calcMalusSel = [...saved.malus];
      } else {
        calcNumSel   = new Array(CALC_NUMBER_CARDS.length).fill(0);
        calcBonusSel = new Array(CALC_BONUS_CARDS.length).fill(0);
        calcMalusSel = new Array(CALC_MALUS_CARDS.length).fill(0);
      }
      buildCalcCards();
      calcUpdateUI();
      const overlay = document.getElementById('calcOverlay');
      if (overlay) overlay.classList.remove('hidden');
    };

    // Wiring calc buttons après chargement du DOM
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('calcClose').addEventListener('click', closeCalc);
      document.getElementById('calcCancelBtn').addEventListener('click', closeCalc);
      document.getElementById('calcOverlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeCalc();
      });
      document.getElementById('calcApplyBtn').addEventListener('click', () => {
        const total = calcCompute();
        const input = document.getElementById('round-' + calcPlayerIndex);
        if (input) {
          input.value = total;
          roundPending[calcPlayerIndex] = total;
          updateScores();
          // Marquer le bouton calculatrice comme utilisé (après renderPlayers)
          setTimeout(() => {
            const calcIconBtn = document.getElementById('calc-icon-' + calcPlayerIndex);
            if (calcIconBtn) calcIconBtn.classList.add('calc-used');
          }, 0);
          // Sauvegarder la sélection par manche + joueur
          const calcKey = round + '-' + calcPlayerIndex;
          calcSavedSel[calcKey] = {
            num: [...calcNumSel],
            bonus: [...calcBonusSel],
            malus: [...calcMalusSel]
          };
        }
        closeCalc();
      });
    });

    function closeCalc() {
      const overlay = document.getElementById('calcOverlay');
      if (overlay) overlay.classList.add('hidden');
    }

  </script>

  <!-- Calculateur Flip 7 -->
  <div class="calc-overlay hidden" id="calcOverlay">
    <div class="calc-modal">
      <div class="calc-header">
        <span class="calc-player-name" id="calcPlayerName"></span>
        <button class="calc-close" id="calcClose" type="button">✕</button>
      </div>
      <div class="calc-total-bar">
        <div>
          <div class="calc-total-label">Score calculé</div>
          <div class="calc-total-value" id="calcTotalValue">0</div>
          <div class="calc-detail" id="calcDetail"></div>
        </div>
        <div class="calc-flip7-badge" id="calcFlip7Badge">⭐ FLIP 7 ! +15</div>
      </div>
      <div class="calc-body">
        <div>
          <div class="calc-section-title">Cartes Nombres (0–13) · max 7</div>
          <div class="calc-cards-grid" id="calcNumberCards"></div>
        </div>
        <div>
          <div class="calc-section-title">Cartes Bonus</div>
          <div class="calc-cards-grid" id="calcBonusCards"></div>
        </div>
        <div>
          <div class="calc-section-title">Cartes Malus</div>
          <div class="calc-cards-grid" id="calcMalusCards"></div>
        </div>
      </div>
      <div class="calc-footer">
        <button class="calc-cancel-btn" id="calcCancelBtn" type="button">Annuler</button>
        <button class="calc-apply-btn" id="calcApplyBtn" type="button">Valider</button>
      </div>
    </div>
  </div>

</body>
</html>
